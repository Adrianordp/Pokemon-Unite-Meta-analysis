services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pokemon-unite-api
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8050
    ports:
      - "8050:8050"

  dashboard:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: pokemon-unite-dashboard
    depends_on:
      - api
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8050
    ports:
      - "8501:8501"
